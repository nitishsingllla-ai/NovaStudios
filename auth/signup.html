<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Create your Nova+ account and start streaming."
    >

    <title>Create Account | Nova+</title>

    <link rel="stylesheet" href="../css/auth-login.css">
</head>

<body>
    <main class="auth-page">
        <header class="auth-header">
            <a
                href="../index.html"
                class="nova-brand"
                aria-label="Nova Studios home"
            >
                NOVA<span>STUDIOS</span>
            </a>
        </header>

        <section class="auth-content" aria-labelledby="signup-title">
            <div class="login-card">
                <div class="nova-plus-mark" aria-hidden="true">
                    NOVA<span>+</span>
                </div>

                <h1 id="signup-title">Create account</h1>

                <p class="login-subtitle">
                    Join Nova+ and start your streaming experience
                </p>

                <form id="signupForm" class="login-form">
                    <div class="form-group">
                        <label for="signupName">Name</label>

                        <input
                            type="text"
                            id="signupName"
                            name="name"
                            placeholder="Enter your name"
                            autocomplete="name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email address</label>

                        <input
                            type="email"
                            id="signupEmail"
                            name="email"
                            placeholder="name@example.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>

                        <div class="password-field">
                            <input
                                type="password"
                                id="signupPassword" 
                                name="password"
                                placeholder="Create a password"
                                autocomplete="new-password"
                                minlength="6"
                                required
                            >

                            <button
                                type="button"
                                id="signupPasswordToggle"
                                class="password-toggle"
                                aria-label="Show password"
                                aria-pressed="false"
                            >
                                Show
                            </button>
                        </div>
                    </div>

                    <p
                        id="signupError"
                        class="login-error"
                        role="alert"
                        aria-live="polite"
                    ></p>

                    <button type="submit" class="sign-in-button">
                        Create Account
                    </button>
                </form>

                <p class="signup-text">
                    Already have Nova+?
                    <a href="./login.html">
                        Sign in
                    </a>
                </p>

                <p class="auth-note">
                    This Nova+ preview uses a local browser-based
                    authentication experience.
                </p>
            </div>
        </section>

        <footer class="auth-footer">
            <p>&copy; 2026 Nova Studios. All rights reserved.</p>
        </footer>
    </main>
<script src="../js/auth.js"></script>
</body>
</html>
